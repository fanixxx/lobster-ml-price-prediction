data:
  snapshot_frequency: "1s"
  trading_start_seconds: 0.0
  trading_end_seconds: 1000000000000.0

features:
  levels: 10
  rolling_windows: [5, 10, 20]
  depth_levels: [5, 10]
  aggregate_windows: [5, 10]
  feature_variants: ["baseline", "depth_plus_window"]

labels:
  modes: ["adaptive", "quantile"]
  horizons: [10, 20, 50]
  fixed_threshold: 0.0005
  volatility_window: 20
  volatility_scale: 0.5
  quantile_lower: 0.2
  quantile_upper: 0.8

models:
  candidates: ["random_forest", "xgboost"]
